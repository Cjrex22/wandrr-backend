server:
  port: 8080

spring:
  application:
    name: wandrr-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/wandrr_db}
    username: ${DB_USERNAME:wandrr_user}
    password: ${DB_PASSWORD:wandrr_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${SENDGRID_API_KEY:placeholder}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# JWT Config
jwt:
  secret: ${JWT_SECRET:wandrr-dev-secret-key-minimum-256-bits-long-for-hmac-sha256-signing-algorithm}
  refresh-secret: ${JWT_REFRESH_SECRET:wandrr-dev-refresh-secret-key-minimum-256-bits-long-for-hmac-sha256}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000
  reset-token-expiry: 300000

# Cloudinary Config
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:placeholder}
  api-secret: ${CLOUDINARY_API_SECRET:placeholder}

# OTP Config
otp:
  expiry-minutes: 10
  max-requests-per-hour: 3
  redis-prefix: "otp:"
  rate-limit-prefix: "otp_rate:"

# App Config
app:
  frontend-url: ${CLIENT_URL:http://localhost:5173}
  from-email: ${FROM_EMAIL:noreply@wandrr.app}
  from-name: Wandrr Team

# OpenWeatherMap API
openweather:
  api:
    key: ${OPENWEATHER_API_KEY:}
