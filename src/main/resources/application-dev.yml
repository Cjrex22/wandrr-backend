# Dev profile — runs without Docker, PostgreSQL, or Redis
spring:
  datasource:
    url: jdbc:h2:mem:wandrrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025

  h2:
    console:
      enabled: true
      path: /h2-console

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  from-email: noreply@wandrr.dev
  frontend-url: http://localhost:5173
